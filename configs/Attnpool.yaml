MODEL:
  PIXEL_MEAN : [127.5, 127.5, 127.5]
  PIXEL_STD : [127.5, 127.5, 127.5]
  META_ARCHITECTURE: "OVSMapAdapter"
  
  SAM3:
    BPE_PATH: "sam3/assets/bpe_simple_vocab_16e6.txt.gz"
    ENABLE_SEGMENTATION: True
    NUM_CDT: 1
    # USE_QUERY_PROJ: True
    USE_PIXEL_PROJ: True
    USE_PE_TEXT: False
    # DYNAMIC_QUERY: True
    # ENCODER_LOSS: True
    # NUM_ENCODER_QUERY: 200
    # COS_SIM: False
    USE_SOFTMAX: True
    ADD_PIXELFEAT: True
    # USE_DOT_PROD_HEAD: True

    ALPHA: 0.8
    BETA: 1.0
    # ORACLE_SELECT: True

  ATTNPOOL:
    ENABLE: True
    # ADD_RADIO_FEAT: True
    # NEW_POOL_DECODER: True
    # BUILD_POOL_DECODER_FROM_MASKDECODER: True
    NUM_PRED_MASKS: 32
    CLASS_WEIGHT: 1.0

  MAP_ADAPTER:
    # ENABLE: True
    NAME: "MAP_ADAPTER"
    FEAT_DIM: 4096
    NUM_ATTN_MAPS: 9
    MASK_IN_CHANNELS: 16
    NUM_CHANNELS: 512
    USE_CHECKPOINT: True
    NUM_OUTPUT_MAPS: 16
    CHUNK_SIZE: 16

  VPT:
    # ENABLE: True
    GRAD_CHECKPOINT: True
    NUM_PROMPTS_TO_INSERT: 5
    START_LAYER: 1  # 1-based from input side, inclusive
    END_LAYER: -1    # -1 means the last block

  WEIGHTS: "/data/hmp/sam3.pt"
  # WEIGHTS: "/root/hub_home/hub/models--facebook--sam3/snapshots/3c879f39826c281e95690f02c7821c4de09afae7/sam3.pt" 
  # WEIGHTS: /root/autodl-tmp/sam3.pt
  # WEIGHTS: /home/haominpeng/data/sam3.pt
  # WEIGHTS: /home/haominpeng/data/SAM_MultiDateset/out/RADIOSAM/copa_attn_cdt_noTXTcrossALL_scale/model_0022499.pth

DATASETS:
  # 只保留 COCO Panoptic
  TRAIN: ("coco_2017_train_panoptic", )
  TEST: ("openvocab_ade20k_panoptic_val",) 
  # TEST: ("openvocab_cityscapes_fine_panoptic_val",)
  # TEST: ("openvocab_ade20k_full_sem_seg_val","openvocab_pascal20_sem_seg_val",'openvocab_pascal_ctx459_sem_seg_val', 'openvocab_pascal_ctx59_sem_seg_val',)
  # TEST: ("openvocab_ade20k_panoptic_val", "openvocab_ade20k_full_sem_seg_val","openvocab_pascal20_sem_seg_val",'openvocab_pascal_ctx459_sem_seg_val', 'openvocab_pascal_ctx59_sem_seg_val',)


SOLVER:
  CLIP_GRADIENTS:
    ENABLED: True
    CLIP_TYPE: "full_model"
    CLIP_VALUE: 0.1
    NORM_TYPE: 2.0
  AMP:
    ENABLED: True
  IMS_PER_BATCH: 8
  BASE_LR: 0.0001
  LR_SCHEDULER_NAME: WarmupPolyLR
  STEPS: (40000, 50000)
  MAX_ITER: 45000
  CHECKPOINT_PERIOD: 5000
  
  WEIGHT_DECAY: 0.0001
  WARMUP_ITERS: 2500
  

  CLASS_WEIGHT: 3.0
  MASK_WEIGHT: 5.0
  DICE_WEIGHT: 5.0
  BBOX_WEIGHT: 5.0
  GIOU_WEIGHT: 2.0

  USE_AUX : True
  TRAIN_OUT_VOCAB: True

SEED: 3407

INPUT:
  DATASET_MAPPER_NAME: "coco_combine_lsj"
  IMAGE_SIZE: 1152
  MIN_SCALE: 0.5
  MAX_SCALE: 2.0
  FORMAT: "RGB"
  COLOR_AUG_SSD: True 
  MASK_FORMAT: "bitmask"
  MIN_SIZE_TEST: 1152
  MAX_SIZE_TEST: 1152

DATALOADER:
  # 如果你的代码支持，可以改回 "TrainingSampler"，
  # 但为了兼容你现有的 MultiDatasetSampler 代码逻辑，建议保持并调整参数为长度1
  SAMPLER_TRAIN: "MultiDatasetSampler"
  
  # 只有一个数据集，比例设为 1.0
  DATASET_RATIO: [1.0]

  # # Batch Size 对应单个数据集
  DATASET_BS: [4]
  
  # COCO 通常不需要 RFS (Repeat Factor Sampling)
  USE_RFS: [False]
  
  # COCO Panoptic 包含 box 和 mask，这里根据你代码对标注类型的定义填写
  DATASET_ANN: ['box'] 
  
  NUM_WORKERS: 4
  FILTER_EMPTY_ANNOTATIONS: True
  ASPECT_RATIO_GROUPING: True
  
  # 单数据集训练时，此项建议设为 False 以遵循 SOLVER.IMS_PER_BATCH
  USE_DIFF_BS_SIZE: True

TEST:
  EVAL_PERIOD: 5000
  SEMANTIC_ON: True   
  # INSTANCE_ON: True   
  # PANOPTIC_ON: True   
VERSION: 2

# OUTPUT_DIR: ./out/test/test
OUTPUT_DIR: ./out/OVSAttnAdapter/copa_attn_cdt/
  
